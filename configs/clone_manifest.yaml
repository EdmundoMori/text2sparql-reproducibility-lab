# Manifest de clonado — solo INCLUDE_PRIMARY / INCLUDE_CONDITIONAL.
# tebaqa (HISTORICAL_ONLY) excluido deliberadamente.
# expected_commit fijado tras primer clon exitoso (pins en REPOSITORIES.lock.yaml).

schema_version: "0.1"
git_lfs_skip_smudge: true
clone_root: upstream

repositories:
  - method_id: sparql_llm
    role: primary
    url: https://github.com/sib-swiss/sparql-llm.git
    local_path: upstream/sparql_llm
    default_branch: main
    inclusion_decision: INCLUDE_PRIMARY
    license_status: CONFIRMED_LICENSE_FILE
    license_spdx: MIT
    wave: WAVE_A_API_OR_LIGHTWEIGHT
    expected_commit: "3748730e3bd2df2595280b918269fdaadb9fc0c3"

  - method_id: mkgqagent
