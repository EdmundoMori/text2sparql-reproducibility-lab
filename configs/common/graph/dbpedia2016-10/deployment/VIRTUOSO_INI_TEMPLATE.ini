; DBpedia 2016-10 lab template — PARAMETERIZED — NOT EXECUTED (Prompt 25A)
; No secrets. Values with ${...} require selected resource profile.

[Database]
DatabaseFile = ${VIRTUOSO_DB_DIR}/virtuoso.db
TransactionFile = ${VIRTUOSO_DB_DIR}/virtuoso.trx
ErrorLogFile = ${VIRTUOSO_LOG_DIR}/virtuoso.log
xa_persistent_file = ${VIRTUOSO_DB_DIR}/virtuoso.pxa
FileExtend = 200
MaxCheckpointRemap = 2000

[Parameters]
ServerPort = ${VIRTUOSO_SERVER_PORT}
NumberOfBuffers = ${NUMBER_OF_BUFFERS}
MaxDirtyBuffers = ${MAX_DIRTY_BUFFERS}
MaxQueryMem = ${MAX_QUERY_MEM}
MaxQueryExecutionTime = ${MAX_QUERY_EXECUTION_TIME}
ResultSetMaxRows = ${RESULT_SET_MAX_ROWS}
DirsAllowed = ${DIRS_ALLOWED}
CheckpointInterval = ${CHECKPOINT_INTERVAL}
; Prefer read-only after successful load (set in post-load procedure)
; TransactionAfterImageLimit — profile dependent

[HTTPServer]
ServerPort = ${VIRTUOSO_HTTP_PORT}
ServerRoot = ${VIRTUOSO_HTTP_ROOT}

[SPARQL]
ResultSetMaxRows = ${RESULT_SET_MAX_ROWS}
MaxQueryExecutionTime = ${MAX_QUERY_EXECUTION_TIME}

; Security: bind locally only at container publish layer (127.0.0.1)
; Concurrency: NumberOfBuffers sized from selected profile RAM
; Backup: external copy of ${VIRTUOSO_DB_DIR} under rollback/
